<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Center</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Boot Screen -->
  <div class="boot" id="boot">
    <div class="boot-card">
      <div class="boot-header">
        <span class="boot-dot"></span>
        <h1>BOOTING SYSTEM</h1>
      </div>
      <p class="boot-status" id="bootStatus">Initializing...</p>
      <div class="boot-bar">
        <div class="boot-fill" id="bootFill"></div>
      </div>
    </div>
  </div>

  <!-- Command Palette -->
  <div class="palette" id="palette">
    <div class="palette-box">
      <input id="paletteInput" type="text" placeholder="Type a command (about, projects, contact, theme)..." />
      <div class="palette-list" id="paletteList"></div>
    </div>
  </div>

  <div class="glow"></div>

  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span class="brand-name">YOURNAME</span>
    </div>

    <div class="actions">
      <span class="clock" id="clock">00:00:00</span>
      <button class="btn" id="themeBtn">Theme</button>
      <button class="btn" id="paletteBtn">Ctrl + K</button>
    </div>
  </header>

  <main class="dashboard">

    <section class="panel profile">
      <h2>Profile</h2>
      <p class="muted">Developer • Designer • Creator</p>

      <div class="stats">
        <div class="stat">
          <h3>15+</h3>
          <p>Projects</p>
        </div>
        <div class="stat">
          <h3>4+</h3>
          <p>Skills</p>
        </div>
        <div class="stat">
          <h3>24/7</h3>
          <p>Building</p>
        </div>
      </div>

      <button class="btn primary" id="aboutBtn">Open Bio</button>
    </section>

    <section class="panel projects">
      <div class="panel-head">
        <h2>Projects</h2>
        <input id="search" type="text" placeholder="Search..." />
      </div>

      <div class="project-grid" id="projectGrid"></div>
    </section>

    <section class="panel feed">
      <h2>System Feed</h2>
      <div class="feed-list" id="feedList"></div>
    </section>

    <section class="panel contact">
      <h2>Contact</h2>
      <p class="muted">Let’s collaborate on something serious.</p>

      <div class="links">
        <a href="#" target="_blank">GitHub</a>
        <a href="#" target="_blank">LinkedIn</a>
        <a href="#" target="_blank">Instagram</a>
      </div>

      <button class="btn" id="contactBtn">Open Contact</button>
    </section>

  </main>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <div class="modal-top">
        <h2 id="modalTitle">Title</h2>
        <button class="close" id="closeModal">✕</button>
      </div>
      <p id="modalBody"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
